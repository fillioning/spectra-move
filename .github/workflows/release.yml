name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify version match
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MODULE_VERSION=$(grep '"version"' src/module.json | head -1 | sed 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/')
          if [ "$TAG_VERSION" != "$MODULE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match module.json version ($MODULE_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker
        run: |
          docker build -t module-builder -f scripts/Dockerfile .
          docker run --rm -v "$PWD:/build" -w /build module-builder bash -c "
            dos2unix /build/src/dsp/*.c 2>/dev/null || true
            mkdir -p /build/dist/spectra
            aarch64-linux-gnu-gcc -O2 -shared -fPIC -ffast-math -o /build/dist/spectra/spectra.so /build/src/dsp/spectra.c -lm
            cp /build/src/module.json /build/dist/spectra/module.json
            cd /build/dist && tar -czf spectra-module.tar.gz spectra/
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/spectra-module.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          git fetch origin "$BRANCH"
          git checkout -f "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cat > release.json << EOF
          {
            "version": "${VERSION}",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/spectra-module.tar.gz"
          }
          EOF
          git add release.json
          git commit -m "ci: update release.json for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin "$BRANCH"
